# Fixture de prueba: tablero cuadrado de 40mm/casilla, alineado a los ejes
# X/Y del brazo, sin inclinación (z constante). Valores de ejemplo, no
# medidos de un tablero real.
square_corners:
  a1: { x_mm: 0.0, y_mm: 0.0, z_mm: 10.0 }
  a8: { x_mm: 0.0, y_mm: 280.0, z_mm: 10.0 }
  h1: { x_mm: 280.0, y_mm: 0.0, z_mm: 10.0 }
  h8: { x_mm: 280.0, y_mm: 280.0, z_mm: 10.0 }

# ZONAS FUERA DEL TABLERO
# Lógica Cinemática, Ergonomía y de Juego Aplicada:
# Supuesto Principal: Ajuste por Alcance Físico del Brazo y Jugador Humano DIESTRO.
#
# 1. Optimización Cinemática (Envolvente de Trabajo):
#    Se ajustaron las coordenadas Y desde los extremos lejanos (y = -50.0 mm y y = 330.0 mm)
#    hacia posiciones intermedias laterales (y = 80.0 mm y y = 200.0 mm). Esto reduce la 
#    distancia radial total al centro/base del robot, evitando singularidades cinemáticas,
#    pérdida de torque por sobreextensión y garantizando que todas las zonas permanezcan
#    dentro del volumen de trabajo alcanzable del manipulador.
#
# 2. Distribución Lateral por Flancos:
#    - FLANCO DERECHO (x = 360.0 mm):
#      * DISCARD_WHITE (y = 80.0 mm): Cementerio de piezas blancas. Ubicado en el flanco
#        derecho a la altura de las Filas 2-3 para despejar el campo visual del jugador.
#      * SPARE_WHITE (y = 200.0 mm): Reserva de Dama blanca. Situada cerca de la Fila 8
#        (y ≈ 280 mm) para realizar trayectorias de coronación cortas y eficientes cuando
#        un peón blanco alcance el extremo opuesto.
#
#    - FLANCO IZQUIERDO (x = -80.0 mm):
#      * SPARE_BLACK (y = 80.0 mm): Reserva de Dama negra. Situada cerca de la Fila 1
#        (y ≈ 0 mm) para minimizar el desplazamiento del brazo al coronar peones negros.
#      * DISCARD_BLACK (y = 200.0 mm): Cementerio de piezas negras retiradas de la partida.
zones:
  DISCARD_WHITE: { x_mm: 360.0, y_mm: 80.0, z_mm: 40.0 }
  SPARE_BLACK: { x_mm: -80.0, y_mm: 80.0, z_mm: 40.0 }
  SPARE_WHITE: { x_mm: 360.0, y_mm: 200.0, z_mm: 40.0 }
  DISCARD_BLACK: { x_mm: -80.0, y_mm: 200.0, z_mm: 40.0 }